<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width,initial-scale=1"> <title>PipeWire EQ Editor</title> <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.container{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:1200px;width:100%;padding:40px}h1{text-align:center;color:#333;margin-bottom:10px;font-size:2em}.subtitle{text-align:center;color:#666;margin-bottom:40px;font-size:.95em}.eq-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:30px;margin-bottom:40px}.eq-band{background:#f8f9fa;padding:20px;border-radius:15px;text-align:center;transition:all .3s ease;border:2px solid #e9ecef}.eq-band:hover{background:#e7f3ff;border-color:#667eea;box-shadow:0 5px 15px rgba(102,126,234,.2)}.band-label{font-weight:600;color:#333;margin-bottom:8px;font-size:.9em}.band-freq{color:#666;font-size:.85em;margin-bottom:15px}.slider-container{margin-bottom:15px}.slider-label{font-size:.8em;color:#667eea;font-weight:600;margin-bottom:5px;margin-top:10px}input[type=range]{width:100%;height:6px;border-radius:3px;background:#ddd;outline:0;-webkit-appearance:none;appearance:none}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#667eea 0,#764ba2 100%);cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:all .2s ease}input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);box-shadow:0 4px 10px rgba(102,126,234,.4)}input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#667eea 0,#764ba2 100%);cursor:pointer;border:none;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:all .2s ease}input[type=range 500 Hz",gainMin:-5,gainMax:0,qMin:.1,qMax:5},{id:"band_7",label:"Anti-Plastic",freq:"2000 Hz",gainMin:-5,gainMax:0,qMin:.1,qMax:5},{id:"band_8",label:"Presence",freq:"4500 Hz",gainMin:0,gainMax:5,qMin:.1,qMax:5},{id:"band_9",label:"Brilliance",freq:"9000 Hz",gainMin:0,gainMax:5,qMin:.1,qMax:5},{id:"band_10",label:"Air",freq:"12000 Hz",gainMin:0,gainMax:5,qMin:.1,qMax:5}],originalGains={};let currentGains={};async function initializeEQ(){console.log("🎵 Initialisiere EQ Editor...");try{const n=await fetch("/api/gains");if(!n.ok)throw new Error(`HTTP Error: ${n.status}`);currentGains=await n.json(),console.log("✓ Gains vom Server geladen:",currentGains),Object.assign(originalGains,currentGains),document.getElementById("loadingSpinner").style.display="none",document.getElementById("eqGrid").style.display="grid",document.getElementById("controlsSection").style.display="flex",renderEQ(),showStatus("✓ Konfiguration erfolgreich geladen!","success")}catch(n){console.error("✗ Fehler beim Laden:",n),showStatus(`✗ Fehler beim Laden der Konfiguration: ${n.message}`,"error"),console.log("⚠ Verwende Default-Werte..."),bands.forEach((n=>{currentGains[`${n.id}`]=0,currentGains[`${n.id}_q`]=1})),Object.assign(originalGains,currentGains),document.getElementById("loadingSpinner").style.display="none",document.getElementById("eqGrid").style.display="grid",document.getElementById("controlsSection").style.display="flex",renderEQ()}}function renderEQ(){console.log("🎨 Rendere EQ mit Gains:",currentGains);const n=document.getElementById("eqGrid");n.innerHTML="",bands.forEach((e=>{const a=currentGains[e.id]||0,i=currentGains[`${e.id}_q`]||1,s=`\n                    <div class="eq-band">\n                        <div class="band-label">${e.label}</div>\n                        <div class="band-freq">${e.freq}</div>\n                        \n                        <div class="slider-label">Gain (dB)</div>\n                        <div class="slider-container">\n                            <input type="range" \n                                   id="slider_${e.id}" \n                                   min="${e.gainMin}" \n                                   max="${e.gainMax}" \n                                   step="0.1" \n                                   value="${a}"\n                                   oninput="updateValue('${e.id}', this.value)">\n                        </div>\n                        <div class="value-display" id="value_${e.id}">${parseFloat(a).toFixed(1)} dB</div>\n                        <div class="band-range">${e.gainMin} - ${e.gainMax} dB</div>\n                        \n                        <div class="slider-label">Q (Breite)</div>\n                        <div class="slider-container">\n                            <input type="range" \n                                   id="slider_${e.id}_q" \n                                   min="${e.qMin}" \n                                   max="${e.qMax}" \n                                   step="0.1" \n                                   value="${i}"\n                                   oninput="updateValue('${e.id}_q', this.value)">\n                        </div>\n                        <div class="value-display" id="value_${e.id}_q">${parseFloat(i).toFixed(1)}</div>\n                        <div class="band-range">${e.qMin} - ${e.qMax}</div>\n                    </div>\n                `;n.innerHTML+=s})),console.log("✓ EQ gerendert")}function updateValue(n,e){currentGains[n]=parseFloat(e),document.getElementById(`value_${n}`).textContent=parseFloat(e).toFixed(1)+(n.includes("_q")?"":" dB")}async function applyChanges(){showStatus("⏳ Speichere Änderungen...","info"),console.log("💾 Speichere Änderungen:",currentGains);try{const n=await fetch("/api/update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(currentGains)}),e=await n.json();n.ok?(showStatus(`✓ ${e.message}`,"success"),console.log("✓ Änderungen erfolgreich gespeichert!")):(showStatus(`✗ Fehler: ${e.message}`,"error"),console.error("✗ Fehler:",e))}catch(n){showStatus(`✗ Fehler beim Speichern: ${n.message}`,"error"),console.error("Error:",n)}}function resetAll(){confirm("Alle EQ-Werte auf Standard zurücksetzen?")&&(Object.keys(currentGains).forEach((n=>{currentGains[n]=originalGains[n]||0})),renderEQ(),applyChanges())}function resetPreset(){Object.assign(currentGains,originalGains),renderEQ(),applyChanges()}function loadPreset(n){const e={music:{band_1:5,band_2:5,band_3:3,band_4:-1.5,band_5:-2,band_6:-2,band_7:-3,band_8:1.5,band_9:2,band_10:2},podcast:{band_1:2,band_2:1.5,band_3:1.5,band_4:-1,band_5:-1.5,band_6:-1.5,band_7:-2,band_8:2.5,band_9:1.5,band_10:0},bright:{band_1:1,band_2:1,band_3:1,band_4:-.5,band_5:-1,band_6:-1,band_7:-1.5,band_8:3,band_9:3,band_10:3},warm:{band_1:6,band_2:6,band_3:4,band_4:-1,band_5:-1.5,band_6:-1.5,band_7:-2,band_8:.5,band_9:1,band_10:1}};e[n]&&(currentGains={...e[n]},bands.forEach((n=>{currentGains[`${n.id}_q`]||(currentGains[`${n.id}_q`]=1)})),renderEQ(),applyChanges(),showStatus(`✓ Preset '${n}' geladen!`,"success"))}function restorePipeWire(){confirm("PipeWire neu starten? (Audioausfall für ~2 Sekunden)")&&(showStatus("⏳ Starte PipeWire neu...","info"),fetch("/api/restart",{method:"POST"}).then((n=>n.json())).then((n=>{showStatus("✓ PipeWire wurde neu gestartet!","success")})).catch((n=>{showStatus(`✗ Fehler: ${n.message}`,"error")})))}function showStatus(n,e){const a=document.getElementById("statusMessage");a.textContent=n,a.className=`status-message ${e}`,console.log(`[${e.toUpperCase()}] ${n}`),setTimeout((()=>{a.className="status-message"}),3e3)}window.addEventListener("load",initializeEQ)</script>
