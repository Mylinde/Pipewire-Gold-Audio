entGains),document.getElementById("loadingSpinner").style.display="none",document.getElementById("eqGrid").style.display="grid",document.getElementById("controlsSection").style.display="flex",renderEQ(),showStatus("✓ Konfiguration erfolgreich geladen!","success")}catch(n){console.error("✗ Fehler beim Laden:",n),showStatus(`✗ Fehler beim Laden der Konfiguration: ${n.message}`,"error"),console.log("⚠ Verwende Default-Werte..."),bands.forEach((n=>{currentGains[`${n.id}`]=0,currentGains[`${n.id}_q`]=1})),Object.assign(originalGains,currentGains),document.getElementById("loadingSpinner").style.display="none",document.getElementById("eqGrid").style.display="grid",document.getElementById("controlsSection").style.display="flex",renderEQ()}}function renderEQ(){console.log("🎨 Rendere EQ mit Gains:",currentGains);const n=document.getElementById("eqGrid");n.innerHTML="",bands.forEach((e=>{const a=currentGains[e.id]||0,i=currentGains[`${e.id}_q`]||1,s=`\n                    <div class="eq-band">\n                        <div class="band-label">${e.label}</div>\n                        <div class="band-freq">${e.freq}</div>\n                        \n                        <div class="slider-label">Gain (dB)</div>\n                        <div class="slider-container">\n                            <input type="range" \n                                   id="slider_${e.id}" \n                                   min="${e.gainMin}" \n                                   max="${e.gainMax}" \n                                   step="0.1" \n                                   value="${a}"\n                                   oninput="updateValue('${e.id}', this.value)">\n                        </div>\n                        <div class="value-display" id="value_${e.id}">${parseFloat(a).toFixed(1)} dB</div>\n                        <div class="band-range">${e.gainMin} - ${e.gainMax} dB</div>\n                        \n                        <div class="slider-label">Q (Breite)</div>\n
