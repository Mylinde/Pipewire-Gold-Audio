<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width,initial-scale=1"> <title>PipeWire Gold Audio EQ Editor</title> <link rel="stylesheet" href="{{ url_for('static', filename='css/main.min.css') }}"> <link rel="stylesheet" href="{{ url_for('static', filename='css/round.min.css') }}"> </head> <body> <div class="container"> <h1><span class="material-icons-round" style="font-size:1.6em" aria-hidden="true">music_note</span> PipeWire Gold Audio EQ Editor</h1> <p class="subtitle">Passe deine Audio-Einstellungen in Echtzeit an</p> <div class="info-box"> <span class="material-icons-round" style="font-size:1.6em" aria-hidden="true">lightbulb</span> <strong>Hinweis:</strong> Änderungen werden sofort gespeichert und PipeWire wird neu gestartet. </div> <div class="preset-section"> <h3><span class="material-icons-round" aria-hidden="true">playlist_play</span> Presets</h3> <div class="preset-buttons"> <button class="btn-preset" onclick='loadPreset("music")' aria-label="Musik"> <span class="material-icons-round" aria-hidden="true">music_note</span>Musik </button> <button class="btn-preset" onclick='loadPreset("podcast")' aria-label="Podcast"> <span class="material-icons-round" aria-hidden="true">mic</span>Podcast </button> <button class="btn-preset" onclick='loadPreset("bright")' aria-label="Hell"> <span class="material-icons-round" aria-hidden="true">wb_sunny</span>Hell </button> <button class="btn-preset" onclick='loadPreset("warm")' aria-label="Warm"> <span class="material-icons-round" aria-hidden="true">whatshot</span>Warm </button> <button class="btn-preset" onclick="resetPreset()" aria-label="Zurücksetzen"> <span class="material-icons-round" aria-hidden="true">restore</span>Zurücksetzen </button> </div> </div> <div id="loadingSpinner" class="loading">  Lade aktuelle Konfiguration... </div>  <div class="controls" id="controlsSection" style="display:none"> <button class="btn-primary" onclick="applyChanges()" aria-labe
