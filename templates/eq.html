<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipeWire Gold Audio EQ Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/round.min.css') }}" />
    <style>
        :root{
            --bg-1: #f6f8fb;
            --bg-2: #eef4fa;
            --card: #ffffff;
            --muted: #6b7280;
            --accent-1: #214daf; /* primary blue */
            --accent-2: #06b6d4; /* cyan */
            --danger: #ef4444a9;
            --shadow-strong: rgba(0,0,0,0.18);
            --shadow-soft: rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Material Icons Round';
            font-style: normal;
            font-weight: 400;
            src: url('../static/fonts/material-icons-round.woff2') format('woff2');
        }
        
        @font-face {
            font-family: 'Assistant';
            font-style: normal;
            font-weight: 400;
            src: url('../static/fonts/assistant-v19-latin-regular.woff2') format('woff2');
        }

        body {
            font-family: 'Assistant', sans-serif;
            font-size: 1.1em;
            background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .container {
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--shadow-strong);
            max-width: 1200px;
            width: 100%;
            padding: 40px;
            border: 1px solid rgba(15,23,42,0.04);
        }

        h1 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 40px;
            font-size: 0.95em;
        }

        .eq-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .eq-band {
            background: linear-gradient(180deg, rgba(255,255,255,0.98), #fbfdff);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid rgba(15,23,42,0.08);
            box-shadow: 0 8px 26px var(--shadow-soft);
        }

        .eq-band:hover {
            background: linear-gradient(180deg, rgba(37,99,235,0.02), rgba(37,99,235,0.06));
            border-color: var(--accent-1,0.08);
            box-shadow: 0 10px 30px rgba(37,99,235,0.08);
            transform: translate(2px,-2px);            
        }

        .band-label {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .band-freq {
            color: var(--muted);
            font-size: 1.0em;
            margin-bottom: 15px;
        }

        .slider-container {
            margin-bottom: 15px;
        }

        .slider-label {
            font-size: 0.8em;
            color: var(--accent-1);
            font-weight: 600;
            margin-bottom: 5px;
            margin-top: 10px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: linear-gradient(90deg, rgba(15, 23, 42, 0.06), #6b728082);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37,99,235,0.16);
            transition: all 0.2s ease;
            border: none;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 6px 14px rgba(37,99,235,0.18);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 12px rgba(37,99,235,0.16);
            transition: all 0.2s ease;
        }

        .value-display {
            background: white;
            border: 2px solid var(--accent-1);
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 600;
            color: var(--accent-1);
            font-size: 1.1em;
            min-width: 50px;
            margin-top: 5px;
            text-align: center;
        }

        .band-range {
            font-size: 0.9em;
            color: #9ca3af;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid rgba(15,23,42,0.04);
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(37,99,235,0.12);
        }

        .btn-secondary {
            background: transparent;
            color: var(--muted);
            border: 1px solid rgba(37,99,235,0.12);
            box-shadow: inset 0 0 0 1px rgba(37,99,235,0.02);
            transition: background .18s ease, border-color .18s ease, transform .18s ease, box-shadow .18s ease;
        }

        .btn-secondary:hover {
            background: rgba(37,99,235,0.06);
            border-color: var(--accent-1);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37,99,235,0.10);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            transition: filter .18s ease, transform .18s ease, box-shadow .18s ease;
        }

        .btn-danger:hover {
            filter: brightness(.98);
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(37,99,235,0.12);
        }

        .btn-primary .material-icons,
        .btn-secondary .material-icons,
        .btn-danger .material-icons {
            color: inherit !important;
        }

        .status-message {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            background: rgba(16,185,129,0.08);
            color: #064e3b;
            display: block;
        }

        .status-message.error {
            background: rgba(239,68,68,0.06);
            color: #7f1d1d;
            display: block;
        }

        .status-message.info {
            background: rgba(14,165,233,0.06);
            color: #0c5460;
            display: block;
        }

        .preset-section {
            background: linear-gradient(180deg, rgba(249,250,251,0.8), rgba(255,255,255,0.6));
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(15,23,42,0.03);
        }

        .preset-section h3 {
            color: #0f172a;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        /* Responsive Preset-Buttons: passen sich automatisch an Fensterbreite an */
        .preset-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            align-items: center;
        }

        .btn-preset {
            width: 100%;
            padding: 8px 10px;
            background: white;
            border: 2px solid var(--accent-1);
            color: var(--accent-1);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.18s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            /* responsive font-size: skaliert mit Viewport, begrenzt zwischen 12px und 16px */
            font-size: clamp(12px, 1.6vw, 16px);
            line-height: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-preset .material-icons {
            flex: 0 0 auto;
            font-size: 1.1em;
        }

        .btn-preset:hover {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.12);
        }
        
        .btn-preset:hover .material-icons {
            color: white !important;
        }

        .info-box {
            background: linear-gradient(180deg, rgba(6,182,212,0.03), rgba(255,255,255,0.4));
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            color: var(--muted);
            font-size: 1.0em;
            border: 1px solid rgba(6,182,212,0.06);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 1.1em;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-1);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .eq-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        .material-icons {
            font-size: 20px;
            vertical-align: middle;
            margin-right: 8px;
            color: var(--accent-1);            
            position: relative;
        }

        .material-icons-round {
            font-size: 20px;
            vertical-align: middle;
            margin-right: 8px;
            top: -0.06em;              
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="material-icons-round" style="font-size:2em" aria-hidden="true">music_note</span> PipeWire Gold Audio EQ Editor</h1>
        <p class="subtitle">Passe deine Audio-Einstellungen in Echtzeit an</p>

        <div class="info-box">
            <span class="material-icons-round" style="font-size:1.6em" aria-hidden="true">lightbulb</span> <strong>Hinweis:</strong> Änderungen werden sofort gespeichert und PipeWire wird neu gestartet.
        </div>

        <div class="preset-section">
            <h3><span class="material-icons-round" aria-hidden="true">playlist_play</span> Presets</h3>
            <div class="preset-buttons">
                <button class="btn-preset" onclick="loadPreset('music')" aria-label="Musik">
                    <span class="material-icons-round" aria-hidden="true">music_note</span>Musik
                </button>
                <button class="btn-preset" onclick="loadPreset('podcast')" aria-label="Podcast">
                    <span class="material-icons-round" aria-hidden="true">mic</span>Podcast
                </button>
                <button class="btn-preset" onclick="loadPreset('bright')" aria-label="Hell">
                    <span class="material-icons-round" aria-hidden="true">wb_sunny</span>Hell
                </button>
                <button class="btn-preset" onclick="loadPreset('warm')" aria-label="Warm">
                    <span class="material-icons-round" aria-hidden="true">whatshot</span>Warm
                </button>
                <button class="btn-preset" onclick="resetPreset()" aria-label="Zurücksetzen">
                    <span class="material-icons-round" aria-hidden="true">restore</span>Zurücksetzen
                </button>
            </div>
        </div>

        <div id="loadingSpinner" class="loading">
            <div class="spinner"></div>
            Lade aktuelle Konfiguration...
        </div>

        <div class="eq-grid" id="eqGrid" style="display: none;"></div>

        <div class="controls" id="controlsSection" style="display: none;">
            <button class="btn-primary" onclick="applyChanges()" aria-label="Änderungen speichern">
                <span class="material-icons-round" aria-hidden="true">save</span>Änderungen speichern
            </button>
            <button class="btn-secondary" onclick="resetAll()" aria-label="Alle zurücksetzen">
                <span class="material-icons-round" aria-hidden="true">restore</span>Alle zurücksetzen
            </button>
            <button class="btn-danger" onclick="restorePipeWire()" aria-label="PipeWire neu starten">
                <span class="material-icons-round" aria-hidden="true">autorenew</span>PipeWire neu starten
            </button>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        const bands = [
            { id: 'band_1', label: 'Bass Boost', freq: '120 Hz', gainMin: 0, gainMax: 10, qMin: 0.1, qMax: 5 },
            { id: 'band_2', label: 'Foundation', freq: '200 Hz', gainMin: 0, gainMax: 10, qMin: 0.1, qMax: 5 },
            { id: 'band_3', label: 'Warmth', freq: '400 Hz', gainMin: 0, gainMax: 10, qMin: 0.1, qMax: 5 },
            { id: 'band_4', label: 'Anti-Boxy', freq: '600 Hz', gainMin: -5, gainMax: 0, qMin: 0.1, qMax: 5 },
            { id: 'band_5', label: 'Anti-Nasal', freq: '1000 Hz', gainMin: -5, gainMax: 0, qMin: 0.1, qMax: 5 },
            { id: 'band_6', label: 'Midrange', freq: '1500 Hz', gainMin: -5, gainMax: 0, qMin: 0.1, qMax: 5 },
            { id: 'band_7', label: 'Anti-Plastic', freq: '2000 Hz', gainMin: -5, gainMax: 0, qMin: 0.1, qMax: 5 },
            { id: 'band_8', label: 'Presence', freq: '4500 Hz', gainMin: 0, gainMax: 5, qMin: 0.1, qMax: 5 },
            { id: 'band_9', label: 'Brilliance', freq: '9000 Hz', gainMin: 0, gainMax: 5, qMin: 0.1, qMax: 5 },
            { id: 'band_10', label: 'Air', freq: '12000 Hz', gainMin: 0, gainMax: 5, qMin: 0.1, qMax: 5 }
        ];

        const originalGains = {};
        let currentGains = {};

        async function initializeEQ() {
            console.log("🎵 Initialisiere EQ Editor...");
            
            try {
                const response = await fetch('/api/gains');
                
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                
                currentGains = await response.json();
                console.log("✓ Gains vom Server geladen:", currentGains);
                
                Object.assign(originalGains, currentGains);
                
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('eqGrid').style.display = 'grid';
                document.getElementById('controlsSection').style.display = 'flex';
                
                renderEQ();
                
                showStatus('✓ Konfiguration erfolgreich geladen!', 'success');
                
            } catch (error) {
                console.error("✗ Fehler beim Laden:", error);
                showStatus(`✗ Fehler beim Laden der Konfiguration: ${error.message}`, 'error');
                
                console.log("⚠ Verwende Default-Werte...");
                bands.forEach(band => {
                    currentGains[`${band.id}`] = 0;
                    currentGains[`${band.id}_q`] = 1.0;
                });
                Object.assign(originalGains, currentGains);
                
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('eqGrid').style.display = 'grid';
                document.getElementById('controlsSection').style.display = 'flex';
                
                renderEQ();
            }
        }

        function renderEQ() {
            console.log("🎨 Rendere EQ mit Gains:", currentGains);
            
            const grid = document.getElementById('eqGrid');
            grid.innerHTML = '';

            bands.forEach(band => {
                const gainValue = currentGains[band.id] || 0;
                const qValue = currentGains[`${band.id}_q`] || 1.0;
                
                const bandHtml = `
                    <div class="eq-band">
                        <div class="band-label">${band.label}</div>
                        <div class="band-freq">${band.freq}</div>
                        
                        <div class="slider-label">Gain (dB)</div>
                        <div class="slider-container">
                            <input type="range" 
                                   id="slider_${band.id}" 
                                   min="${band.gainMin}" 
                                   max="${band.gainMax}" 
                                   step="0.1" 
                                   value="${gainValue}"
                                   oninput="updateValue('${band.id}', this.value)">
                        </div>
                        <div class="value-display" id="value_${band.id}">${parseFloat(gainValue).toFixed(1)} dB</div>
                        <div class="band-range">${band.gainMin} - ${band.gainMax} dB</div>
                        
                        <div class="slider-label">Q (Breite)</div>
                        <div class="slider-container">
                            <input type="range" 
                                   id="slider_${band.id}_q" 
                                   min="${band.qMin}" 
                                   max="${band.qMax}" 
                                   step="0.1" 
                                   value="${qValue}"
                                   oninput="updateValue('${band.id}_q', this.value)">
                        </div>
                        <div class="value-display" id="value_${band.id}_q">${parseFloat(qValue).toFixed(1)}</div>
                        <div class="band-range">${band.qMin} - ${band.qMax}</div>
                    </div>
                `;
                grid.innerHTML += bandHtml;
            });
            
            console.log("✓ EQ gerendert");
        }

        function updateValue(key, value) {
            currentGains[key] = parseFloat(value);
            document.getElementById(`value_${key}`).textContent = parseFloat(value).toFixed(1) + (key.includes('_q') ? '' : ' dB');
        }

        async function applyChanges() {
            showStatus('⏳ Speichere Änderungen...', 'info');
            console.log("💾 Speichere Änderungen:", currentGains);

            try {
                const response = await fetch('/api/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(currentGains)
                });

                const data = await response.json();
                
                if (response.ok) {
                    showStatus(`✓ ${data.message}`, 'success');
                    console.log("✓ Änderungen erfolgreich gespeichert!");
                } else {
                    showStatus(`✗ Fehler: ${data.message}`, 'error');
                    console.error("✗ Fehler:", data);
                }
            } catch (error) {
                showStatus(`✗ Fehler beim Speichern: ${error.message}`, 'error');
                console.error('Error:', error);
            }
        }

        function resetAll() {
            if (confirm('Alle EQ-Werte auf Standard zurücksetzen?')) {
                Object.keys(currentGains).forEach(key => {
                    currentGains[key] = originalGains[key] || 0;
                });
                renderEQ();
                applyChanges();
            }
        }

        function resetPreset() {
            Object.assign(currentGains, originalGains);
            renderEQ();
            applyChanges();
        }

        function loadPreset(preset) {
            const presets = {
                music: { band_1: 5, band_2: 5, band_3: 3, band_4: -1.5, band_5: -2, band_6: -2, band_7: -3, band_8: 1.5, band_9: 2, band_10: 2 },
                podcast: { band_1: 2, band_2: 1.5, band_3: 1.5, band_4: -1, band_5: -1.5, band_6: -1.5, band_7: -2, band_8: 2.5, band_9: 1.5, band_10: 0 },
                bright: { band_1: 1, band_2: 1, band_3: 1, band_4: -0.5, band_5: -1, band_6: -1, band_7: -1.5, band_8: 3, band_9: 3, band_10: 3 },
                warm: { band_1: 6, band_2: 6, band_3: 4, band_4: -1, band_5: -1.5, band_6: -1.5, band_7: -2, band_8: 0.5, band_9: 1, band_10: 1 }
            };

            if (presets[preset]) {
                currentGains = { ...presets[preset] };
                // Setze Q-Werte auf Default
                bands.forEach(band => {
                    if (!currentGains[`${band.id}_q`]) {
                        currentGains[`${band.id}_q`] = 1.0;
                    }
                });
                renderEQ();
                applyChanges();
                showStatus(`✓ Preset '${preset}' geladen!`, 'success');
            }
        }

        function restorePipeWire() {
            if (confirm('PipeWire neu starten? (Audioausfall für ~2 Sekunden)')) {
                showStatus('⏳ Starte PipeWire neu...', 'info');
                fetch('/api/restart', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        showStatus('✓ PipeWire wurde neu gestartet!', 'success');
                    })
                    .catch(error => {
                        showStatus(`✗ Fehler: ${error.message}`, 'error');
                    });
            }
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            console.log(`[${type.toUpperCase()}] ${message}`);
            
            setTimeout(() => {
                statusEl.className = 'status-message';
            }, 3000);
        }

        // Initialisiere beim Laden
        window.addEventListener('load', initializeEQ);
    </script>
</body>
</html>
