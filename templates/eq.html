<!DOCTYPE html>
<html lang="{{ current_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#181818" media="(prefers-color-scheme:dark)"/>
    <meta name="theme-color" content="#f6f8fb" media="(prefers-color-scheme:light)"/>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-title" content="PipeWire EQ">
    
    <title>{{ _('PipeWire Gold Audio EQ Editor') }}</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" media="(prefers-color-scheme:dark)"/>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon-light.ico') }}" media="(prefers-color-scheme:light)"/>    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.min.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/round.min.css') }}" />
</head>
<body>
    <div class="container">
        <h1>
            <span class="material-icons-round" style="font-size:1.6em" aria-hidden="true">music_note</span>
            {{ _('PipeWire Gold Audio EQ Editor') }}
        </h1>
        <p class="subtitle">{{ _('Adjust your audio settings in real-time') }}</p>

        <div class="info-box">
            <span class="material-icons-round" style="font-size:1.6em" aria-hidden="true">lightbulb</span>
            <strong>{{ _('Note:') }}</strong> {{ _('Changes are saved immediately and PipeWire is restarted.') }}
        </div>

        <div class="preset-section">
            <h3><span class="material-icons-round" aria-hidden="true">playlist_play</span> {{ _('Presets') }}</h3>
            <div class="preset-buttons">
                <button class="btn-preset" onclick="loadPreset('music')" aria-label="{{ _('Music') }}">
                    <span class="material-icons-round" aria-hidden="true">music_note</span>{{ _('Music') }}
                </button>
                <button class="btn-preset" onclick="loadPreset('podcast')" aria-label="{{ _('Podcast') }}">
                    <span class="material-icons-round" aria-hidden="true">mic</span>{{ _('Podcast') }}
                </button>
                <button class="btn-preset" onclick="loadPreset('bright')" aria-label="{{ _('Bright') }}">
                    <span class="material-icons-round" aria-hidden="true">wb_sunny</span>{{ _('Bright') }}
                </button>
                <button class="btn-preset" onclick="loadPreset('warm')" aria-label="{{ _('Warm') }}">
                    <span class="material-icons-round" aria-hidden="true">whatshot</span>{{ _('Warm') }}
                </button>
                <button class="btn-preset" onclick="resetPreset()" aria-label="{{ _('Reset') }}">
                    <span class="material-icons-round" aria-hidden="true">restore</span>{{ _('Reset') }}
                </button>
            </div>
        </div>

        <div id="loadingSpinner" class="loading">
            <div class="spinner"></div>
            {{ _('Loading current configuration...') }}
        </div>

        <div class="eq-grid" id="eqGrid" style="display: none;"></div>

        <div class="controls" id="controlsSection" style="display: none;">
            <button class="btn-primary" onclick="applyChanges()" aria-label="{{ _('Save changes') }}">
                <span class="material-icons-round" aria-hidden="true">save</span>{{ _('Save changes') }}
            </button>
            <button class="btn-secondary" onclick="resetAll()" aria-label="{{ _('Reset all') }}">
                <span class="material-icons-round" aria-hidden="true">restore</span>{{ _('Reset all') }}
            </button>
            <button class="btn-danger" onclick="restorePipeWire()" aria-label="{{ _('Restart PipeWire') }}">
                <span class="material-icons-round" aria-hidden="true">autorenew</span>{{ _('Restart PipeWire') }}
            </button>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/change-language.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme-toggler.min.js') }}"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ url_for('static', filename='js/serviceworker.js') }}")
                    .then(reg => console.log('✓ Service Worker registered'))
                    .catch(err => console.error('✗ Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
