context.modules = [
    { name = "libpipewire-module-rt"
        # Enables real-time (RT) support for lower audio latency.
        # Check if PipeWire has a configuration in /etc/security/limits.d/25-pw-rlimits.conf.
        # The user running this configuration must be a member of the "pipewire" group
        # for RT priority to take effect.
        # Check if it's running in RT with: ps -mo pid,tid,rtprio,comm -C pipewire
        args = {
            rt.prio = 83
            rt.time.soft = -1
            rt.time.hard = -1
        }
        flags = [ ifexists nofail ]
    }
    { name = "libpipewire-module-filter-chain"
        args = {
            # node.description and node.name can be customized to your preference
            node.description = "Pipewire Gold Standard Audio"
            media.name       = "Pipewire Gold Standard Audio"                                    
            # Sampling rate is set in the PipeWire daemon configuration:
            # (see /etc/pipewire/pipewire.conf.d/ or ~/.config/pipewire/)
            # Do not override here to avoid conflicts with global settings.
            # default.clock.rate = 48000
            audio.channels   = 2
            audio.position   = [ FL FR ]
            filter.graph = {
                nodes = [
                    # Protection & Clarity: removes inaudible bass (<65Hz)
                    { type = "builtin" name = "eq_hp"      label = "bq_highpass" control = { Freq = 65.0 Q = 0.1 } }
                    # Sub-Bass / Kick Peak (adds punch)
                    { type = "builtin" name = "eq_band_1"  label = "bq_peaking"   control = { Freq = 80.0  Q = 1.5 Gain = 5.0 } }
                    # Foundation (200Hz)
                    { type = "builtin" name = "eq_band_2"  label = "bq_lowshelf"  control = { Freq = 200.0 Q = 1.0 Gain = 5.0 } } 
                    # Warmth (400Hz)
                    { type = "builtin" name = "eq_band_3"  label = "bq_peaking"   control = { Freq = 400.0 Q = 0.5 Gain = 3.0 } } 
                    # Anti-Boxy (reduces boxy sound)
                    { type = "builtin" name = "eq_band_4"  label = "bq_peaking"   control = { Freq = 600.0 Q = 1.2 Gain = -1.5 } }
                    # Anti-Nasal (1000Hz)
                    { type = "builtin" name = "eq_band_5"  label = "bq_peaking"   control = { Freq = 1000.0 Q = 1.2 Gain = -2.0 } }
                    # Midrange Clarity (intermediate step)
                    { type = "builtin" name = "eq_band_6"  label = "bq_peaking"   control = { Freq = 1500.0 Q = 1.5 Gain = -2.0 } }
                    # Anti-Plastic (2000Hz)
                    { type = "builtin" name = "eq_band_7"  label = "bq_peaking"   control = { Freq = 2000.0 Q = 1.5 Gain = -3.0 } } 
                    # Presence (4500Hz)
                    { type = "builtin" name = "eq_band_8"  label = "bq_peaking"   control = { Freq = 4500.0 Q = 1.5 Gain = 1.5 } } 
                    # Brilliance (9000Hz)
                    { type = "builtin" name = "eq_band_9"  label = "bq_highshelf" control = { Freq = 9000.0 Q = 1.0 Gain = 2.0 } }
                    # Air (adds silkiness)
                    { type = "builtin" name = "eq_band_10" label = "bq_peaking"   control = { Freq = 12000.0 Q = 1.0 Gain = 2.0 } }
                    # De-Esser (reduces sibilance S/Sh sounds at 6kHz)
                    { type = "builtin" name = "de_esser"   label = "bq_peaking"   control = { Freq = 6000.0 Q = 2.0 Gain = -1.5 } }
                    # Final Gain (volume adjustment - transparent boost)
                    # Calculation: Factor = 10^(dB / 20)
                    # +1dB  ≈ 1.12
                    # +2dB  ≈ 1.26
                    # +3dB  ≈ 1.41
                    # +4dB  ≈ 1.58
                    # +6dB  ≈ 2.00
                    # Factor 1.15 for solid level without clipping
                    { type = "builtin" name = "final_gain" label = "bq_allpass" control = { Gain = 1.15 } }
                ]
                links = [
                    { output = "eq_hp:Out"        input = "eq_band_1:In" }
                    { output = "eq_band_1:Out"    input = "eq_band_2:In" }
                    { output = "eq_band_2:Out"    input = "eq_band_3:In" }
                    { output = "eq_band_3:Out"    input = "eq_band_4:In" }
                    { output = "eq_band_4:Out"    input = "eq_band_5:In" }
                    { output = "eq_band_5:Out"    input = "eq_band_6:In" }
                    { output = "eq_band_6:Out"    input = "eq_band_7:In" }
                    { output = "eq_band_7:Out"    input = "eq_band_8:In" }
                    { output = "eq_band_8:Out"    input = "eq_band_9:In" }
                    { output = "eq_band_9:Out"    input = "eq_band_10:In" }
                    { output = "eq_band_10:Out"   input = "de_esser:In" }
                    { output = "de_esser:Out"     input = "final_gain:In" }
                ]
                inputs  = [ "eq_hp:In" ]
                outputs = [ "final_gain:Out" ]
            }

            capture.props = {
                node.name = "effect_input.eq6"
                node.pause-on-idle = true
                node.passive = false
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "effect_output.eq6"
                node.pause-on-idle = true
                node.passive = false               
                channelmix.upmix = true
                channelmix.upmix-method = "psd"
                channelmix.stereo-widen = 0.35
                # target.object: exact PipeWire/Pulse sink name, e.g. "alsa_output...._sink"
                # is automatically set by the install script.
                # can be manually determined with the following steps:
                # 1) wpctl status
                #    -> find the required sink and note the ID (on the left, e.g. 56).
                # 2) wpctl inspect <ID>
                #    -> in the output, look for "node.name" or an entry with "alsa_output".
                #    Example: node.name = "alsa_output.pci-0000_03_00.6.HiFi__hw_Generic_1__sink"
                # Use the found name exactly as target.object.
                target.object = "WILL_BE_SET_BY_INSTALL_SCRIPT"
            }
        }
    }
]

