context.modules = [
    { name = "libpipewire-module-rt"
        # Enables real-time (RT) support for lower audio latency.
        # Check if PipeWire has a configuration in /etc/security/limits.d/25-pw-rlimits.conf.
        # The user running this configuration must be a member of the "pipewire" group
        # for RT priority to take effect.
        # Check if it's running in RT with: ps -mo pid,tid,rtprio,comm -C pipewire
        args = {
            rt.prio = 83
            rt.time.soft = -1
            rt.time.hard = -1
        }
        flags = [ ifexists nofail ]
    }

    { name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "Pipewire Gold (5.1) Audio"
            media.name       = "Pipewire Gold (5.1) Audio"
            # Sampling rate is set in the PipeWire daemon configuration:
            # (see /etc/pipewire/pipewire.conf.d/ or ~/.config/pipewire/)
            # Do not override here to avoid conflicts with global settings.
            # default.clock.rate = 48000
            filter.graph = {
                nodes = [
                    # Duplicate inputs (for 5.1: FL FR FC LFE SL SR)
                    { type = "builtin" label = "copy" name = "copyFL"  }
                    { type = "builtin" label = "copy" name = "copyFR"  }
                    { type = "builtin" label = "copy" name = "copyFC"  }
                    { type = "builtin" label = "copy" name = "copyRL"  }
                    { type = "builtin" label = "copy" name = "copyRR"  }
                    { type = "builtin" label = "copy" name = "copySL"  }
                    { type = "builtin" label = "copy" name = "copySR"  }
                    { type = "builtin" label = "copy" name = "copyLFE" }

                    # HeSuVi 14-channel WAV
                    { type = "builtin" label = "convolver" name = "convFL_L" config = { filename = "hesuvi.wav" channel =  0 } }
                    { type = "builtin" label = "convolver" name = "convFL_R" config = { filename = "hesuvi.wav" channel =  1 } }
                    { type = "builtin" label = "convolver" name = "convSL_L" config = { filename = "hesuvi.wav" channel =  2 } }
                    { type = "builtin" label = "convolver" name = "convSL_R" config = { filename = "hesuvi.wav" channel =  3 } }
                    { type = "builtin" label = "convolver" name = "convRL_L" config = { filename = "hesuvi.wav" channel =  4 } }
                    { type = "builtin" label = "convolver" name = "convRL_R" config = { filename = "hesuvi.wav" channel =  5 } }
                    { type = "builtin" label = "convolver" name = "convFC_L" config = { filename = "hesuvi.wav" channel =  6 } }
                    { type = "builtin" label = "convolver" name = "convFR_R" config = { filename = "hesuvi.wav" channel =  7 } }
                    { type = "builtin" label = "convolver" name = "convFR_L" config = { filename = "hesuvi.wav" channel =  8 } }
                    { type = "builtin" label = "convolver" name = "convSR_R" config = { filename = "hesuvi.wav" channel =  9 } }
                    { type = "builtin" label = "convolver" name = "convSR_L" config = { filename = "hesuvi.wav" channel = 10 } }
                    { type = "builtin" label = "convolver" name = "convRR_R" config = { filename = "hesuvi.wav" channel = 11 } }
                    { type = "builtin" label = "convolver" name = "convRR_L" config = { filename = "hesuvi.wav" channel = 12 } }
                    { type = "builtin" label = "convolver" name = "convFC_R" config = { filename = "hesuvi.wav" channel = 13 } }

                    # LFE as FC
                    { type = "builtin" label = "convolver" name = "convLFE_L" config = { filename = "hesuvi.wav" channel =  6 } }
                    { type = "builtin" label = "convolver" name = "convLFE_R" config = { filename = "hesuvi.wav" channel = 13 } }

                    # Stereo mixers (before EQ)
                    { type = "builtin" label = "mixer" name = "mixL" }
                    { type = "builtin" label = "mixer" name = "mixR" }
                   
                    # 10-Band EQ (left channel, after mixers)
                    { type = "builtin" label = "bq_highpass" name = "eq_hp_L"      control = { Freq = 65.0 Q = 0.3 Gain = 0.5 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_1_L"  control = { Freq = 120.0 Q = 1.5 Gain = 6.0 } }
                    { type = "builtin" label = "bq_lowshelf" name = "eq_band_2_L"  control = { Freq = 200.0 Q = 1.0 Gain = 5.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_3_L"  control = { Freq = 400.0 Q = 0.5 Gain = 3.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_4_L"  control = { Freq = 600.0 Q = 1.2 Gain = -1.5 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_5_L"  control = { Freq = 1000.0 Q = 1.2 Gain = -2.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_6_L"  control = { Freq = 1500.0 Q = 1.5 Gain = -2.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_7_L"  control = { Freq = 2000.0 Q = 1.5 Gain = -3.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_8_L"  control = { Freq = 4500.0 Q = 1.5 Gain = 1.5 } }
                    { type = "builtin" label = "bq_highshelf" name = "eq_band_9_L" control = { Freq = 9000.0 Q = 1.0 Gain = 2.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_10_L" control = { Freq = 12000.0 Q = 1.0 Gain = 2.0 } }
                    # De-Esser (reduces sibilance S/Sh sounds at 6kHz)
                    { type = "builtin" name = "de_esser_L"   label = "bq_peaking"  control = { Freq = 6000.0 Q = 2.0 Gain = -1.5 } }
                    
                    # Final gain (volume adjustment)
                    # Calculation: Factor = 10^(dB / 20)
                    # +1dB  ≈ 1.12, +2dB  ≈ 1.26, +3dB  ≈ 1.41, +4dB  ≈ 1.58, +6dB  ≈ 2.00
                    # Factor 5.0 to get the same loudness as stereo
                    { type = "builtin"  label = "bq_allpass" name = "final_gain_L" control = { Gain = 5.0 } }

                    # Limiter to prevent clipping from EQ boosts, especially in the high frequencies
                    { type = "builtin" name = "soft_limiter_L" label = "bq_highshelf" control = { Freq = 10000.0 Q = 0.7 Gain = -1.0 } }

                    # 10-Band EQ (right channel, after mixers)
                    { type = "builtin" label = "bq_highpass" name = "eq_hp_R"      control = { Freq = 65.0 Q = 0.3 Gain = 0.5 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_1_R"  control = { Freq = 120.0 Q = 1.5 Gain = 6.0 } }
                    { type = "builtin" label = "bq_lowshelf" name = "eq_band_2_R"  control = { Freq = 200.0 Q = 1.0 Gain = 5.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_3_R"  control = { Freq = 400.0 Q = 0.5 Gain = 3.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_4_R"  control = { Freq = 600.0 Q = 1.2 Gain = -1.5 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_5_R"  control = { Freq = 1000.0 Q = 1.2 Gain = -2.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_6_R"  control = { Freq = 1500.0 Q = 1.5 Gain = -2.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_7_R"  control = { Freq = 2000.0 Q = 1.5 Gain = -3.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_8_R"  control = { Freq = 4500.0 Q = 1.5 Gain = 1.5 } }
                    { type = "builtin" label = "bq_highshelf" name = "eq_band_9_R" control = { Freq = 9000.0 Q = 1.0 Gain = 2.0 } }
                    { type = "builtin" label = "bq_peaking"  name = "eq_band_10_R" control = { Freq = 12000.0 Q = 1.0 Gain = 2.0 } }
                    # De-Esser (reduces sibilance S/Sh sounds at 6kHz)
                    { type = "builtin" name = "de_esser_R"   label = "bq_peaking"  control = { Freq = 6000.0 Q = 2.0 Gain = -1.5 } }
                    
                    # Final gain (volume adjustment)
                    # Calculation: Factor = 10^(dB / 20)
                    # +1dB  ≈ 1.12, +2dB  ≈ 1.26, +3dB  ≈ 1.41, +4dB  ≈ 1.58, +6dB  ≈ 2.00
                    # Factor 5.0 to get the same loudness as stereo
                    { type = "builtin"  label = "bq_allpass" name = "final_gain_R" control = { Gain = 5.0 } }
                
                    # Limiter to prevent clipping from EQ boosts, especially in the high frequencies
                    { type = "builtin" name = "soft_limiter_R" label = "bq_highshelf" control = { Freq = 10000.0 Q = 0.7 Gain = -1.0 } }
                ]
                links = [
                    # Input -> convolver routing (5.1)
                    { output = "copyFL:Out"  input="convFL_L:In"  }
                    { output = "copyFL:Out"  input="convFL_R:In"  }

                    { output = "copyFR:Out"  input="convFR_L:In"  }
                    { output = "copyFR:Out"  input="convFR_R:In"  }

                    { output = "copyFC:Out"  input="convFC_L:In"  }
                    { output = "copyFC:Out"  input="convFC_R:In"  }

                    { output = "copyLFE:Out"  input = "convLFE_L:In" }
                    { output = "copyLFE:Out"  input = "convLFE_R:In" }

                    { output = "copySL:Out"  input="convSL_L:In"  }
                    { output = "copySL:Out"  input="convSL_R:In"  }

                    { output = "copySR:Out"  input="convSR_L:In"  }
                    { output = "copySR:Out"  input="convSR_R:In"  }

                    # Convolver -> final stereo mixers (Downmix/HRIR -> stereo)
                    { output = "convFL_L:Out"  input="mixL:In 1" }
                    { output = "convFL_R:Out"  input="mixR:In 1" }

                    { output = "convFR_L:Out"  input="mixL:In 2" }
                    { output = "convFR_R:Out"  input="mixR:In 2" }

                    { output = "convFC_L:Out"  input="mixL:In 3" }
                    { output = "convFC_R:Out"  input="mixR:In 3" }

                    { output = "convLFE_L:Out" input="mixL:In 4" }
                    { output = "convLFE_R:Out" input="mixR:In 4" }

                    { output = "convSL_L:Out"  input="mixL:In 5" }
                    { output = "convSL_R:Out"  input="mixR:In 5" }

                    { output = "convSR_L:Out"  input="mixL:In 6" }
                    { output = "convSR_R:Out"  input="mixR:In 6" }

                    # Mixers -> 10-Band EQ (separate per channel)
                    { output = "mixL:Out" input = "eq_hp_L:In" }
                    { output = "eq_hp_L:Out"       input = "eq_band_1_L:In" }
                    { output = "eq_band_1_L:Out"   input = "eq_band_2_L:In" }
                    { output = "eq_band_2_L:Out"   input = "eq_band_3_L:In" }
                    { output = "eq_band_3_L:Out"   input = "eq_band_4_L:In" }
                    { output = "eq_band_4_L:Out"   input = "eq_band_5_L:In" }
                    { output = "eq_band_5_L:Out"   input = "eq_band_6_L:In" }
                    { output = "eq_band_6_L:Out"   input = "eq_band_7_L:In" }
                    { output = "eq_band_7_L:Out"   input = "eq_band_8_L:In" }
                    { output = "eq_band_8_L:Out"   input = "eq_band_9_L:In" }
                    { output = "eq_band_9_L:Out"   input = "eq_band_10_L:In" }
                    { output = "eq_band_10_L:Out"   input = "de_esser_L:In" }
                    { output = "de_esser_L:Out"     input = "final_gain_L:In" }
                    { output = "final_gain_L:Out"   input = "soft_limiter_L:In" }

                    { output = "mixR:Out" input = "eq_hp_R:In" }
                    { output = "eq_hp_R:Out"       input = "eq_band_1_R:In" }
                    { output = "eq_band_1_R:Out"   input = "eq_band_2_R:In" }
                    { output = "eq_band_2_R:Out"   input = "eq_band_3_R:In" }
                    { output = "eq_band_3_R:Out"   input = "eq_band_4_R:In" }
                    { output = "eq_band_4_R:Out"   input = "eq_band_5_R:In" }
                    { output = "eq_band_5_R:Out"   input = "eq_band_6_R:In" }
                    { output = "eq_band_6_R:Out"   input = "eq_band_7_R:In" }
                    { output = "eq_band_7_R:Out"   input = "eq_band_8_R:In" }
                    { output = "eq_band_8_R:Out"   input = "eq_band_9_R:In" }
                    { output = "eq_band_9_R:Out"   input = "eq_band_10_R:In" }
                    { output = "eq_band_10_R:Out"   input = "de_esser_R:In" }
                    { output = "de_esser_R:Out"     input = "final_gain_R:In" }
                    { output = "final_gain_R:Out"   input = "soft_limiter_R:In" }
                ]
                inputs  = [ "copyFL:In" "copyFR:In" "copyFC:In" "copyLFE:In" "copySL:In" "copySR:In" ]
                outputs = [ "soft_limiter_L:Out" "soft_limiter_R:Out" ]
            }
            capture.props = {
                node.name      = "effect_input.hesuvi_5.1"
                node.pause-on-idle = true
                node.passive = false
                media.class    = Audio/Sink
                audio.channels = 6
                audio.position = [ FL FR FC LFE SL SR ]
            }
            playback.props = {
                node.name      = "effect_output.hesuvi_5.1"
                node.passive   = true
                node.pause-on-idle = true
                audio.channels   = 2
                audio.position   = [ FL FR ]
                # target.object: exact PipeWire/Pulse sink name, e.g. "alsa_output...._sink"
                # is automatically set by the install script.
                # can be manually determined with the following steps:
                # 1) wpctl status
                #    -> find the required sink and note the ID (on the left, e.g. 56).
                # 2) wpctl inspect <ID>
                #    -> in the output, look for "node.name" or an entry with "alsa_output".
                #    Example: node.name = "alsa_output.pci-0000_03_00.6.HiFi__hw_Generic_1__sink"
                # Use the found name exactly as target.object.
                target.object = "WILL_BE_SET_BY_INSTALL_SCRIPT"
            }
        }
    }
]